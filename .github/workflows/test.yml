name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: packages/contracts/lib
          key: forge-deps-${{ hashFiles('packages/contracts/foundry.toml') }}

      - name: Install dependencies
        run: |
          if [ ! -d "lib/forge-std" ]; then
            forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts OpenZeppelin/openzeppelin-contracts-upgradeable transmissions11/solmate --no-git
          fi

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/contracts/out
            packages/contracts/cache
          key: forge-build-${{ hashFiles('packages/contracts/src/**/*.sol', 'packages/contracts/foundry.toml') }}
          restore-keys: forge-build-

      - name: Build
        run: forge build --sizes

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-build
          path: |
            packages/contracts/out
            packages/contracts/cache
          retention-days: 1

  test-unit:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: packages/contracts/lib
          key: forge-deps-${{ hashFiles('packages/contracts/foundry.toml') }}

      - name: Install dependencies
        run: |
          if [ ! -d "lib/forge-std" ]; then
            forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts OpenZeppelin/openzeppelin-contracts-upgradeable transmissions11/solmate --no-git
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: forge-build

      - name: Run unit + integration + invariant + security tests
        run: forge test --match-path 'test/{unit,integration,invariant,security}/**' -v

  test-fork:
    name: Fork + E2E Tests
    needs: build
    runs-on: ubuntu-latest
    environment: E2E
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: packages/contracts/lib
          key: forge-deps-${{ hashFiles('packages/contracts/foundry.toml') }}

      - name: Install dependencies
        run: |
          if [ ! -d "lib/forge-std" ]; then
            forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts OpenZeppelin/openzeppelin-contracts-upgradeable transmissions11/solmate --no-git
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: forge-build

      - name: Start Anvil fork
        run: |
          if [ -z "${{ secrets.DRPC_KEY }}" ]; then
            echo "::error::DRPC_KEY secret is required for fork tests"
            exit 1
          fi
          anvil --fork-url "https://lb.drpc.org/ogrpc?network=ethereum&dkey=${{ secrets.DRPC_KEY }}" \
            --fork-block-number 25538490 --chain-id 1 --no-mining &

      - name: Wait for Anvil
        run: |
          for i in $(seq 1 30); do
            if cast block-number --rpc-url http://localhost:8545 2>/dev/null; then
              echo "Anvil is ready at block $(cast block-number --rpc-url http://localhost:8545)"
              exit 0
            fi
            echo "Waiting for Anvil... ($i/30)"
            sleep 2
          done
          echo "Anvil failed to start"
          exit 1

      - name: Run fork tests
        run: forge test --match-path 'test/fork/**' --fork-url http://localhost:8545 -v
        timeout-minutes: 10

      - name: Run E2E tests
        run: forge test --match-path 'test/e2e/**' --fork-url http://localhost:8545 -v
        timeout-minutes: 15

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: packages/contracts/lib
          key: forge-deps-${{ hashFiles('packages/contracts/foundry.toml') }}

      - name: Install dependencies
        run: |
          if [ ! -d "lib/forge-std" ]; then
            forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts OpenZeppelin/openzeppelin-contracts-upgradeable transmissions11/solmate --no-git
          fi

      - name: Check formatting
        run: forge fmt --check
