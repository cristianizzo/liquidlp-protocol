name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/contracts/out
            packages/contracts/cache
          key: forge-build-${{ hashFiles('packages/contracts/src/**/*.sol', 'packages/contracts/test/**/*.sol', 'packages/contracts/foundry.toml') }}
          restore-keys: forge-build-

      - name: Install dependencies
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts OpenZeppelin/openzeppelin-contracts-upgradeable transmissions11/solmate --no-git

      - name: Build
        run: forge build --sizes

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-build
          path: |
            packages/contracts/out
            packages/contracts/cache
          retention-days: 1

  test-unit:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: forge-build

      - name: Install dependencies
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts OpenZeppelin/openzeppelin-contracts-upgradeable transmissions11/solmate --no-git

      - name: Run unit tests
        id: unit
        run: forge test --match-path 'test/unit/**' -v
        background: true

      - name: Run integration tests
        id: integration
        run: forge test --match-path 'test/integration/**' -v
        background: true

      - name: Run invariant tests
        id: invariant
        run: forge test --match-path 'test/invariant/**' -v
        background: true

      - name: Run security tests
        id: security
        run: forge test --match-path 'test/security/**' -v
        background: true

      - name: Wait for all tests
        wait-all: true

  test-fork:
    name: Fork + E2E Tests
    needs: build
    runs-on: ubuntu-latest
    environment: E2E
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: forge-build

      - name: Install dependencies
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts OpenZeppelin/openzeppelin-contracts-upgradeable transmissions11/solmate --no-git

      - name: Start Anvil fork
        id: anvil
        run: |
          if [ -n "${{ secrets.DRPC_KEY }}" ]; then
            ETH_RPC_URL="https://lb.drpc.org/ogrpc?network=ethereum&dkey=${{ secrets.DRPC_KEY }}"
          else
            ETH_RPC_URL="https://ethereum-rpc.publicnode.com"
          fi
          anvil --fork-url "$ETH_RPC_URL" --block-time 12 --chain-id 1
        background: true

      - name: Wait for Anvil
        run: |
          for i in $(seq 1 30); do
            if cast block-number --rpc-url http://localhost:8545 2>/dev/null; then
              echo "Anvil is ready at block $(cast block-number --rpc-url http://localhost:8545)"
              exit 0
            fi
            echo "Waiting for Anvil... ($i/30)"
            sleep 2
          done
          echo "Anvil failed to start"
          exit 1

      - name: Run fork tests (compiles + runs)
        run: forge test --match-path 'test/fork/**' --fork-url http://localhost:8545 -v
        timeout-minutes: 10

      - name: Run E2E tests (no recompile)
        run: forge test --match-path 'test/e2e/**' --fork-url http://localhost:8545 -v
        timeout-minutes: 15

      - name: Stop Anvil
        cancel: anvil

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Install dependencies
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts OpenZeppelin/openzeppelin-contracts-upgradeable transmissions11/solmate --no-git

      - name: Check formatting
        run: forge fmt --check
