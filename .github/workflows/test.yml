name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            packages/contracts/out
            packages/contracts/cache
          key: forge-build-${{ hashFiles('packages/contracts/src/**/*.sol', 'packages/contracts/test/**/*.sol', 'packages/contracts/foundry.toml') }}
          restore-keys: forge-build-

      - name: Install dependencies
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts OpenZeppelin/openzeppelin-contracts-upgradeable transmissions11/solmate --no-git

      - name: Build
        run: forge build --sizes

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-build
          path: |
            packages/contracts/out
            packages/contracts/cache
          retention-days: 1

  test-unit:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: forge-build

      - name: Install dependencies
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts OpenZeppelin/openzeppelin-contracts-upgradeable transmissions11/solmate --no-git

      - name: Run unit tests
        run: forge test --match-path 'test/unit/**' -v

      - name: Run integration tests
        run: forge test --match-path 'test/integration/**' -v

      - name: Run invariant tests
        run: forge test --match-path 'test/invariant/**' -v

      - name: Run security tests
        run: forge test --match-path 'test/security/**' -v

  test-fork:
    name: Fork + E2E Tests
    needs: build
    runs-on: ubuntu-latest
    environment: E2E
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: forge-build

      - name: Install dependencies
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts OpenZeppelin/openzeppelin-contracts-upgradeable transmissions11/solmate --no-git

      - name: Run fork tests
        run: forge test --match-path 'test/fork/**' -v
        timeout-minutes: 10
        env:
          ETH_RPC_URL: ${{ secrets.DRPC_KEY && format('https://lb.drpc.org/ogrpc?network=ethereum&dkey={0}', secrets.DRPC_KEY) || 'https://ethereum-rpc.publicnode.com' }}

      - name: Run E2E tests
        run: forge test --match-path 'test/e2e/**' -v
        timeout-minutes: 15
        env:
          ETH_RPC_URL: ${{ secrets.DRPC_KEY && format('https://lb.drpc.org/ogrpc?network=ethereum&dkey={0}', secrets.DRPC_KEY) || 'https://ethereum-rpc.publicnode.com' }}

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          cache: true

      - name: Install dependencies
        run: forge install foundry-rs/forge-std OpenZeppelin/openzeppelin-contracts OpenZeppelin/openzeppelin-contracts-upgradeable transmissions11/solmate --no-git

      - name: Check formatting
        run: forge fmt --check
