services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command:
      - "--fork-url"
      - "${ETH_RPC_URL}"
      - "--host"
      - "0.0.0.0"
      - "--block-time"
      - "12"
      - "--chain-id"
      - "1"
    ports:
      - "8545:8545"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
