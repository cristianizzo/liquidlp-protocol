[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false
fs_permissions = [{ access = "read", path = "./script/config" }]

# Unit tests: fast, no fork
[profile.default.fuzz]
runs = 10000
max_test_rejects = 500000

[profile.default.invariant]
runs = 1000
depth = 100

# CI profile: faster builds + fewer fuzz runs
# via_ir required (stack depth), but optimizer disabled for ~3x faster compile.
# Optimizer only affects gas costs, not correctness.
[profile.ci]
optimizer = false
fuzz = { runs = 500 }
invariant = { runs = 100, depth = 50 }

[rpc_endpoints]
ethereum = "${ETH_RPC_URL}"
base = "${BASE_RPC_URL}"
arbitrum = "${ARB_RPC_URL}"
bsc = "${BSC_RPC_URL}"
polygon = "${POLYGON_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
localhost = "http://localhost:8545"

[etherscan]
ethereum = { key = "${ETHERSCAN_KEY}" }
base = { key = "${BASESCAN_KEY}" }
arbitrum = { key = "${ARBISCAN_KEY}" }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"
single_line_statement_blocks = "preserve"
